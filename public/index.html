<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videoto — 콘텐츠 자동 생성 관리</title>
<style>
  :root {
    --primary: #1a56db; --primary-light: #3b82f6; --success: #059669;
    --warning: #d97706; --danger: #dc2626; --bg: #0f172a; --surface: #1e293b;
    --surface2: #334155; --text: #f1f5f9; --text-dim: #94a3b8; --border: #475569;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header h1 span { color: var(--primary-light); }
  .header-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .kill-switch { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .toggle { width: 44px; height: 24px; background: var(--success); border-radius: 12px; position: relative; cursor: pointer; transition: .3s; }
  .toggle.off { background: var(--danger); }
  .toggle::after { content: ''; width: 20px; height: 20px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: .3s; }
  .toggle.off::after { left: 22px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
  .stat-card .label { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
  .stat-card .value { font-size: 28px; font-weight: 800; }
  .stat-card .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .panel { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 24px; overflow: hidden; }
  .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .panel-header h2 { font-size: 16px; font-weight: 600; }
  .panel-body { padding: 20px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; font-size: 13px; color: var(--text-dim); font-weight: 500; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; font-size: 14px; border-bottom: 1px solid rgba(71,85,105,.3); }
  tr:hover td { background: rgba(59,130,246,.05); }
  .badge { padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; display: inline-block; }
  .badge-published { background: rgba(5,150,105,.15); color: #34d399; }
  .badge-generated { background: rgba(217,119,6,.15); color: #fbbf24; }
  .badge-error { background: rgba(220,38,38,.15); color: #f87171; }
  .btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: .2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-light); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--primary-light); color: var(--primary-light); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-success { background: var(--success); color: #fff; }
  .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .topic-item { padding: 10px 14px; background: var(--surface2); border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: .2s; font-size: 13px; }
  .topic-item:hover { border-color: var(--primary-light); }
  .topic-item.selected { border-color: var(--primary); background: rgba(26,86,219,.15); }
  .topic-item .cat { font-size: 11px; color: var(--text-dim); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--surface); border-radius: 16px; max-width: 800px; width: 90%; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border); }
  .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-body { padding: 20px; }
  .close-btn { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { padding: 8px 16px; border-radius: 8px; background: var(--surface2); color: var(--text-dim); cursor: pointer; font-size: 13px; border: none; }
  .tab.active { background: var(--primary); color: #fff; }
  .code-block { background: var(--bg); border-radius: 8px; padding: 16px; font-family: 'JetBrains Mono', monospace; font-size: 13px; overflow-x: auto; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
  .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-dim); }
  .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--primary-light); border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 진행 상태 */
  .progress-panel { background: var(--bg); border-radius: 12px; padding: 20px; margin-top: 16px; border: 1px solid var(--border); }
  .progress-step { display: flex; align-items: center; gap: 12px; padding: 8px 0; font-size: 14px; }
  .progress-step .icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .progress-step .icon.done { background: rgba(5,150,105,.2); color: #34d399; }
  .progress-step .icon.running { background: rgba(59,130,246,.2); color: #60a5fa; animation: pulse 1.5s infinite; }
  .progress-step .icon.waiting { background: rgba(148,163,184,.1); color: #64748b; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; margin-top: 12px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 3px; transition: width .5s; }
  .progress-time { font-size: 12px; color: var(--text-dim); margin-top: 8px; text-align: right; }

  /* 주제관리 */
  .topic-manage { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .topic-row { display: flex; gap: 8px; align-items: center; padding: 8px 12px; background: var(--surface2); border-radius: 8px; }
  .topic-row input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 13px; }
  .topic-row input.w-cat { width: 80px; }
  .topic-row input.w-title { flex: 1; min-width: 120px; }
  .topic-row input.w-hook { flex: 1; min-width: 150px; }

  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr 1fr; }
    .topic-grid { grid-template-columns: 1fr; }
    .topic-row { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📹 <span>Videoto</span> — 콘텐츠 자동 생성</h1>
  <div class="header-actions">
    <div class="kill-switch">
      <span>시스템</span>
      <div class="toggle" id="killSwitch" onclick="toggleKillSwitch()"></div>
    </div>
    <button class="btn btn-primary" onclick="openGeneratePanel()">➕ 수동 생성</button>
    <button class="btn btn-outline" onclick="openTopicManager()">📝 주제 관리</button>
    <button class="btn btn-outline" onclick="loadDashboard()">🔄 새로고침</button>
  </div>
</div>

<div class="container">
  <div class="grid" id="stats">
    <div class="stat-card"><div class="label">총 콘텐츠</div><div class="value" id="statTotal">-</div><div class="sub">생성된 전체 콘텐츠</div></div>
    <div class="stat-card"><div class="label">게시 완료</div><div class="value" id="statPublished" style="color:var(--success)">-</div><div class="sub">플랫폼 게시 완료</div></div>
    <div class="stat-card"><div class="label">대기 중</div><div class="value" id="statPending" style="color:var(--warning)">-</div><div class="sub">게시 대기</div></div>
    <div class="stat-card"><div class="label">다음 주제</div><div class="value" id="statNextTopic" style="font-size:16px;">-</div><div class="sub" id="statNextTopicSub">-</div></div>
  </div>

  <!-- 진행 상태 패널 -->
  <div class="panel" id="progressPanel" style="display:none;">
    <div class="panel-header">
      <h2>🔄 <span id="progressTitle">콘텐츠 생성 진행 중...</span></h2>
      <span id="progressElapsed" style="font-size:13px; color:var(--text-dim);"></span>
    </div>
    <div class="panel-body">
      <div id="progressSteps"></div>
      <div class="progress-bar"><div class="progress-bar-fill" id="progressBarFill" style="width:0%"></div></div>
      <div class="progress-time" id="progressTime"></div>
    </div>
  </div>

  <!-- 최근 콘텐츠 -->
  <div class="panel">
    <div class="panel-header">
      <h2>📋 최근 콘텐츠</h2>
      <span style="font-size:13px; color:var(--text-dim);">최근 20개</span>
    </div>
    <div class="panel-body" style="padding:0;">
      <table>
        <thead><tr><th>콘텐츠 ID</th><th>주제</th><th>카테고리</th><th>상태</th><th>점수</th><th>소요</th><th>생성일</th><th>액션</th></tr></thead>
        <tbody id="contentTable"><tr><td colspan="8" class="loading"><div class="spinner"></div> 로딩 중...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- 수동 생성 패널 -->
  <div class="panel" id="generatePanel" style="display:none;">
    <div class="panel-header">
      <h2>➕ 수동 콘텐츠 생성</h2>
      <button class="btn btn-sm btn-outline" onclick="document.getElementById('generatePanel').style.display='none'">닫기</button>
    </div>
    <div class="panel-body">
      <p style="margin-bottom:12px; color:var(--text-dim);">생성할 주제를 선택하세요 (선택하지 않으면 순서대로 자동 선택)</p>
      <div class="topic-grid" id="topicGrid"></div>
      <div style="margin-top:12px; display:flex; gap:12px;">
        <button class="btn btn-primary" onclick="runGenerate()" id="generateBtn">🚀 콘텐츠 생성 시작</button>
        <span id="generateStatus" style="align-self:center; font-size:14px; color:var(--text-dim);"></span>
      </div>
    </div>
  </div>

  <!-- 주제 관리 패널 -->
  <div class="panel" id="topicPanel" style="display:none;">
    <div class="panel-header">
      <h2>📝 주제 관리</h2>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-sm btn-success" onclick="addTopic()">+ 주제 추가</button>
        <button class="btn btn-sm btn-outline" onclick="document.getElementById('topicPanel').style.display='none'">닫기</button>
      </div>
    </div>
    <div class="panel-body">
      <div id="topicManager" class="topic-manage"></div>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">콘텐츠 상세</h2>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="loading"><div class="spinner"></div> 로딩 중...</div>
    </div>
  </div>
</div>

<script>
const API_BASE = 'https://asia-northeast3-kfpc-company-support-project.cloudfunctions.net';

let TOPICS = [];
let selectedTopicIndex = null;
let progressTimer = null;
let generateStartTime = null;

// ════════════════════════════════════════
// 초기화
// ════════════════════════════════════════
async function init() {
  await loadTopics();
  await loadDashboard();
  checkActiveProgress();
}

// ════════════════════════════════════════
// 주제 목록 API에서 로드
// ════════════════════════════════════════
async function loadTopics() {
  try {
    const res = await fetch(`${API_BASE}/topicList`);
    if (res.ok) {
      const data = await res.json();
      if (data.success && data.topics.length > 0) {
        TOPICS = data.topics;
        return;
      }
    }
  } catch (e) { console.log('주제 로드 실패, 기본값 사용'); }
  // 폴백
  TOPICS = [
    { id:'T01', category:'AI기능', title:'여러 AI를 한 번에', hook:'ChatGPT·Gemini·Claude·Perplexity 통합' },
    { id:'T02', category:'AI기능', title:'AI 버튼 한 번으로 전문 분석', hook:'상속·증여·절세·은퇴 맞춤 분석' },
    { id:'T03', category:'AI기능', title:'RAG 기반 자료 검색', hook:'업로드하면 AI가 즉시 답변' },
    { id:'T04', category:'AI기능', title:'이중 답변 구조', hook:'고객엔 핵심만, 전문가엔 완전한 해답' },
    { id:'T05', category:'관리', title:'내 업무 스타일에 맞춘 커스터마이징', hook:'메뉴·디자인 자유 설정' },
    { id:'T06', category:'관리', title:'반응형 + 모바일 최적화', hook:'PC·모바일 완벽 지원' },
    { id:'T07', category:'마케팅', title:'고객은 준비된 컨설턴트를 선택합니다', hook:'준비된 전문가 이미지 각인' },
    { id:'T08', category:'마케팅', title:'당신의 시간은 더 가치 있는 일에', hook:'반복 업무는 AI에게' },
    { id:'T09', category:'브랜딩', title:'전문성, 이제 홈페이지가 말합니다', hook:'전략이 담긴 나만의 홈페이지' },
    { id:'T10', category:'브랜딩', title:'혼자 일하지 마세요', hook:'프리미엄 AI가 24시간 지원' },
  ];
}

// ════════════════════════════════════════
// 대시보드
// ════════════════════════════════════════
async function loadDashboard() {
  try {
    const statusRes = await fetch(`${API_BASE}/systemStatus`);
    if (statusRes.ok) {
      const data = await statusRes.json();
      if (data.success) {
        document.getElementById('killSwitch').className = data.system.killSwitch ? 'toggle off' : 'toggle';
        const nextIdx = data.system.currentTopicIndex % TOPICS.length;
        document.getElementById('statNextTopic').textContent = TOPICS[nextIdx]?.title || '-';
        document.getElementById('statNextTopicSub').textContent = `#${nextIdx + 1} / ${TOPICS.length}`;
      }
    }
  } catch (e) { console.log('시스템 상태 로드 실패'); }

  try {
    const listRes = await fetch(`${API_BASE}/listContents?limit=20`);
    if (listRes.ok) {
      const data = await listRes.json();
      if (data.success) {
        const total = data.contents.length;
        const published = data.contents.filter(c => c.status === 'published').length;
        const pending = total - published;
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statPublished').textContent = published;
        document.getElementById('statPending').textContent = pending;

        const tbody = document.getElementById('contentTable');
        if (total === 0) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px; color:var(--text-dim);">아직 생성된 콘텐츠가 없습니다. 수동 생성을 시작해보세요.</td></tr>';
        } else {
          tbody.innerHTML = data.contents.map(c => {
            const status = c.status === 'published' ? '<span class="badge badge-published">게시완료</span>'
              : c.status === 'error' ? '<span class="badge badge-error">에러</span>'
              : '<span class="badge badge-generated">대기중</span>';
            const date = c.createdAt ? new Date(c.createdAt._seconds ? c.createdAt._seconds * 1000 : c.createdAt).toLocaleDateString('ko') : '-';
            const score = c.metadata?.stages?.reviewed?.review?.totalScore || c.review?.totalScore || '-';
            const elapsed = c.metadata?.elapsedSeconds ? `${c.metadata.elapsedSeconds}초` : '-';
            return `<tr>
              <td><a href="#" onclick="showDetail('${c.contentId}');return false" style="color:var(--primary-light)">${c.contentId}</a></td>
              <td>${c.topic?.title || '-'}</td>
              <td>${c.topic?.category || '-'}</td>
              <td>${status}</td>
              <td>${score}</td>
              <td>${elapsed}</td>
              <td>${date}</td>
              <td><button class="btn btn-sm btn-outline" onclick="showDetail('${c.contentId}')">상세</button> <button class="btn btn-sm btn-outline" onclick="downloadContent('${c.contentId}')">📦</button></td>
            </tr>`;
          }).join('');
        }
      }
    }
  } catch (e) { document.getElementById('contentTable').innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px; color:var(--text-dim);">API 연결 대기 중... 잠시 후 새로고침하세요.</td></tr>'; }
}

// ════════════════════════════════════════
// 수동 생성
// ════════════════════════════════════════
function openGeneratePanel() {
  const panel = document.getElementById('generatePanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  renderTopicGrid();
}

function renderTopicGrid() {
  document.getElementById('topicGrid').innerHTML = TOPICS.map((t, i) => `
    <div class="topic-item ${selectedTopicIndex === i ? 'selected' : ''}" onclick="selectTopic(${i})">
      <div class="cat">${t.category}</div>
      <strong>${t.title}</strong>
    </div>
  `).join('');
}

function selectTopic(idx) {
  selectedTopicIndex = selectedTopicIndex === idx ? null : idx;
  renderTopicGrid();
}

async function runGenerate() {
  const btn = document.getElementById('generateBtn');
  const status = document.getElementById('generateStatus');
  btn.disabled = true;
  btn.textContent = '⏳ 생성 중...';
  status.textContent = 'AI 4개가 협업 중입니다. 약 3~4분 소요...';
  generateStartTime = Date.now();

  // 진행 상태 패널 표시
  showProgressPanel();

  const url = selectedTopicIndex !== null
    ? `${API_BASE}/manualGenerate?topicIndex=${selectedTopicIndex}`
    : `${API_BASE}/manualGenerate`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    stopProgressPolling();
    if (data.success) {
      status.innerHTML = `✅ <strong>${data.contentId}</strong> 생성 완료! (${data.elapsed || '-'}초, ${data.score || '-'}점)`;
      updateProgressComplete(data);
      await loadDashboard();
    } else {
      status.textContent = `❌ 실패: ${data.error}`;
      updateProgressError(data.error);
    }
  } catch (e) {
    stopProgressPolling();
    status.textContent = `❌ 연결 실패: ${e.message}`;
    updateProgressError(e.message);
  }
  btn.disabled = false;
  btn.textContent = '🚀 콘텐츠 생성 시작';
}

// ════════════════════════════════════════
// 실시간 진행 상태
// ════════════════════════════════════════
const STEP_LABELS = {
  init: { label: '초기화', icon: '🔧' },
  stage0: { label: 'Perplexity 트렌드 조사', icon: '🔍' },
  stage1_shorts: { label: 'GPT-4o 쇼츠 생성', icon: '🎬' },
  stage1_carousel: { label: 'GPT-4o 카드뉴스 생성', icon: '📰' },
  stage1_blog: { label: 'GPT-4o 블로그 생성', icon: '📝' },
  stage2: { label: 'Claude Opus 통합 검수', icon: '🔎' },
  stage3: { label: 'Gemini 최종 패키징', icon: '📦' },
  complete: { label: '완료', icon: '✅' },
};
const STEP_ORDER = ['stage0','stage1_shorts','stage1_carousel','stage1_blog','stage2','stage3'];

function showProgressPanel() {
  const panel = document.getElementById('progressPanel');
  panel.style.display = 'block';
  document.getElementById('progressTitle').textContent = '콘텐츠 생성 진행 중...';
  renderProgressSteps({});
  startProgressPolling();
}

function renderProgressSteps(steps) {
  const html = STEP_ORDER.map((key, i) => {
    const step = steps[key];
    const info = STEP_LABELS[key] || { label: key, icon: '⬜' };
    let iconClass = 'waiting';
    let iconText = '⬜';
    let detail = '';
    if (step) {
      if (step.status === 'done') { iconClass = 'done'; iconText = '✅'; }
      else if (step.status === 'running') { iconClass = 'running'; iconText = '🔄'; }
      detail = step.detail || '';
    }
    return `<div class="progress-step">
      <div class="icon ${iconClass}">${iconText}</div>
      <div style="flex:1">
        <div><strong>${info.label}</strong></div>
        ${detail ? `<div style="font-size:12px; color:var(--text-dim);">${detail}</div>` : ''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('progressSteps').innerHTML = html;

  // 프로그레스바 계산
  const doneCount = STEP_ORDER.filter(k => steps[k]?.status === 'done').length;
  const runningCount = STEP_ORDER.filter(k => steps[k]?.status === 'running').length;
  const percent = Math.round(((doneCount + runningCount * 0.5) / STEP_ORDER.length) * 100);
  document.getElementById('progressBarFill').style.width = percent + '%';

  // 경과 시간
  if (generateStartTime) {
    const elapsed = Math.round((Date.now() - generateStartTime) / 1000);
    document.getElementById('progressTime').textContent = `경과: ${elapsed}초`;
  }
}

function startProgressPolling() {
  stopProgressPolling();
  progressTimer = setInterval(async () => {
    try {
      const res = await fetch(`${API_BASE}/generateProgress`);
      if (res.ok) {
        const data = await res.json();
        if (data.success && data.progress?.steps) {
          renderProgressSteps(data.progress.steps);
        }
      }
    } catch (e) { /* 무시 */ }
    // 경과 시간 업데이트
    if (generateStartTime) {
      const elapsed = Math.round((Date.now() - generateStartTime) / 1000);
      document.getElementById('progressTime').textContent = `경과: ${elapsed}초`;
    }
  }, 2000);
}

function stopProgressPolling() {
  if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
}

function updateProgressComplete(data) {
  document.getElementById('progressTitle').textContent = `✅ ${data.contentId} 생성 완료!`;
  document.getElementById('progressBarFill').style.width = '100%';
  const elapsed = data.elapsed || Math.round((Date.now() - generateStartTime) / 1000);
  document.getElementById('progressTime').textContent = `완료! ${elapsed}초 소요, 검수 ${data.score || '-'}점`;
  // 모든 스텝 done으로
  const allDone = {};
  STEP_ORDER.forEach(k => { allDone[k] = { status: 'done', detail: '' }; });
  renderProgressSteps(allDone);
}

function updateProgressError(error) {
  document.getElementById('progressTitle').textContent = `❌ 생성 실패`;
  document.getElementById('progressTime').textContent = error;
}

async function checkActiveProgress() {
  try {
    const res = await fetch(`${API_BASE}/generateProgress`);
    if (res.ok) {
      const data = await res.json();
      if (data.success && data.progress && data.progress.currentStatus === 'running') {
        generateStartTime = new Date(data.progress.updatedAt).getTime() - 60000;
        showProgressPanel();
        renderProgressSteps(data.progress.steps || {});
      }
    }
  } catch (e) { /* 무시 */ }
}

// ════════════════════════════════════════
// 주제 관리
// ════════════════════════════════════════
function openTopicManager() {
  const panel = document.getElementById('topicPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  renderTopicManager();
}

function renderTopicManager() {
  document.getElementById('topicManager').innerHTML = TOPICS.map((t, i) => `
    <div class="topic-row" id="topicRow_${i}">
      <span style="color:var(--text-dim); font-size:12px; width:30px;">${t.id}</span>
      <input class="w-cat" value="${t.category}" placeholder="카테고리" id="cat_${i}">
      <input class="w-title" value="${t.title}" placeholder="주제 제목" id="title_${i}">
      <input class="w-hook" value="${t.hook || ''}" placeholder="후킹 포인트" id="hook_${i}">
      <button class="btn btn-sm btn-primary" onclick="saveTopic(${i})">저장</button>
      <button class="btn btn-sm btn-danger" onclick="deleteTopic('${t.id}', ${i})">삭제</button>
    </div>
  `).join('') + `
    <div class="topic-row" id="topicRow_new" style="border:2px dashed var(--primary); background:rgba(26,86,219,.08);">
      <span style="color:var(--primary-light); font-size:12px; width:30px;">NEW</span>
      <input class="w-cat" value="" placeholder="카테고리" id="cat_new">
      <input class="w-title" value="" placeholder="주제 제목" id="title_new">
      <input class="w-hook" value="" placeholder="후킹 포인트" id="hook_new">
      <button class="btn btn-sm btn-success" onclick="saveNewTopic()">추가</button>
    </div>
  `;
}

async function saveTopic(idx) {
  const topic = TOPICS[idx];
  const category = document.getElementById(`cat_${idx}`).value.trim();
  const title = document.getElementById(`title_${idx}`).value.trim();
  const hook = document.getElementById(`hook_${idx}`).value.trim();
  if (!title) { alert('주제 제목을 입력하세요.'); return; }
  const btn = document.querySelector(`#topicRow_${idx} .btn-primary`);
  btn.textContent = '저장 중...'; btn.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/topicUpdate`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'edit', topic: { id: topic.id, category, title, hook } })
    });
    const data = await res.json();
    if (data.success) {
      TOPICS[idx] = { ...topic, category, title, hook };
      btn.textContent = '✅ 완료'; setTimeout(() => { btn.textContent = '저장'; btn.disabled = false; }, 1500);
      renderTopicGrid();
    } else { alert('저장 실패: ' + (data.error || '')); btn.textContent = '저장'; btn.disabled = false; }
  } catch (e) { alert('저장 실패: ' + e.message); btn.textContent = '저장'; btn.disabled = false; }
}

async function saveNewTopic() {
  const category = document.getElementById('cat_new').value.trim();
  const title = document.getElementById('title_new').value.trim();
  const hook = document.getElementById('hook_new').value.trim();
  if (!title) { alert('주제 제목을 입력하세요.'); return; }
  if (!category) { alert('카테고리를 입력하세요.'); return; }
  const btn = document.querySelector('#topicRow_new .btn-success');
  btn.textContent = '추가 중...'; btn.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/topicUpdate`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'add', topic: { category, title, hook } })
    });
    const data = await res.json();
    if (data.success) {
      await loadTopics();
      renderTopicManager();
      renderTopicGrid();
    } else { alert('추가 실패: ' + (data.error || '')); btn.textContent = '추가'; btn.disabled = false; }
  } catch (e) { alert('추가 실패: ' + e.message); btn.textContent = '추가'; btn.disabled = false; }
}

function addTopic() {
  // 주제 관리 패널 열고 NEW 행으로 스크롤
  document.getElementById('topicPanel').style.display = 'block';
  renderTopicManager();
  setTimeout(() => { document.getElementById('cat_new')?.focus(); }, 200);
}

async function deleteTopic(topicId, idx) {
  if (!confirm(`"${TOPICS[idx].title}" 주제를 삭제하시겠습니까?`)) return;
  const btn = document.querySelector(`#topicRow_${idx} .btn-danger`);
  btn.textContent = '삭제 중...'; btn.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/topicUpdate`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'delete', topic: { id: topicId } })
    });
    const data = await res.json();
    if (data.success) {
      await loadTopics();
      renderTopicManager();
      renderTopicGrid();
    } else { alert('삭제 실패'); btn.textContent = '삭제'; btn.disabled = false; }
  } catch (e) { alert('삭제 실패: ' + e.message); btn.textContent = '삭제'; btn.disabled = false; }
}

// ════════════════════════════════════════
// 상세 보기
// ════════════════════════════════════════
async function showDetail(contentId) {
  const modal = document.getElementById('detailModal');
  const body = document.getElementById('modalBody');
  modal.classList.add('active');
  document.getElementById('modalTitle').textContent = contentId;
  body.innerHTML = '<div class="loading"><div class="spinner"></div> 로딩 중...</div>';
  try {
    const res = await fetch(`${API_BASE}/getContent?id=${contentId}`);
    const data = await res.json();
    if (data.success && data.content) {
      const c = data.content;
      const final = c.stages?.final || c.finalContent || {};
      const review = c.stages?.reviewed?.review || {};
      body.innerHTML = `
        <div class="tabs">
          <button class="tab active" onclick="showTab('shorts',this)">🎬 쇼츠</button>
          <button class="tab" onclick="showTab('carousel',this)">📰 카드뉴스</button>
          <button class="tab" onclick="showTab('blog',this)">📝 블로그</button>
          <button class="tab" onclick="showTab('meta',this)">📊 메타정보</button>
        </div>
        <div id="tab_shorts">${renderShorts(final.shorts)}</div>
        <div id="tab_carousel" style="display:none">${renderCarousel(final.carousel)}</div>
        <div id="tab_blog" style="display:none">${renderBlog(final.blog)}</div>
        <div id="tab_meta" style="display:none">${renderMeta(c, review)}</div>
      `;
    } else { body.innerHTML = '<p>콘텐츠를 찾을 수 없습니다.</p>'; }
  } catch (e) { body.innerHTML = `<p>로드 실패: ${e.message}</p>`; }
}

function showTab(name, el) {
  document.querySelectorAll('[id^="tab_"]').forEach(t => t.style.display = 'none');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab_' + name).style.display = 'block';
  el.classList.add('active');
}

function renderShorts(s) {
  if (!s) return '<p>쇼츠 데이터 없음</p>';
  const scenes = (s.scenes || []).map(sc => `<div style="padding:8px 0; border-bottom:1px solid var(--border);">
    <strong>${sc.time}</strong> [${sc.type}]<br>
    <span style="color:#fbbf24;">자막: ${sc.subtitle || '-'}</span><br>
    <span style="color:var(--text-dim);">나레이션: ${sc.narration || '-'}</span><br>
    <span style="font-size:12px; color:#64748b;">비주얼: ${sc.visual || '-'}</span>
  </div>`).join('');
  return `<h3 style="margin-bottom:12px;">${s.title || '제목 없음'}</h3>
    ${s.description ? `<p style="color:var(--text-dim); margin-bottom:12px;">${s.description}</p>` : ''}
    ${s.thumbnailText ? `<p>썸네일: <strong>${s.thumbnailText}</strong></p>` : ''}
    <div style="margin-top:12px;">${scenes}</div>
    ${s.hashtags ? `<p style="margin-top:12px; color:var(--primary-light);">${s.hashtags.join(' ')}</p>` : ''}`;
}

function renderCarousel(c) {
  if (!c) return '<p>카드뉴스 데이터 없음</p>';
  const slides = (c.slides || []).map(sl => `<div style="padding:12px; margin:8px 0; background:${sl.bgColor || 'var(--bg)'}; border-radius:8px;">
    <div style="font-size:11px; color:var(--text-dim);">${sl.type || ''} — ${sl.page}장</div>
    <div style="font-size:16px; font-weight:700; margin:4px 0;">${sl.headline || ''}</div>
    <div style="color:var(--text-dim);">${sl.body || ''}</div>
  </div>`).join('');
  return `<h3 style="margin-bottom:12px;">${c.title || ''}</h3>
    ${c.caption ? `<p style="color:var(--text-dim); margin-bottom:12px;">${c.caption}</p>` : ''}
    ${slides}`;
}

function renderBlog(b) {
  if (!b) return '<p>블로그 데이터 없음</p>';
  return `<h3 style="margin-bottom:8px;">${b.title || ''}</h3>
    <p style="color:var(--text-dim); margin-bottom:16px;">${b.metaDescription || ''}</p>
    <div style="background:var(--bg); padding:16px; border-radius:8px; line-height:1.8;">${b.htmlBody || b.body || ''}</div>
    ${b.tags ? `<p style="margin-top:12px; color:var(--primary-light);">${b.tags.map(t => '#'+t).join(' ')}</p>` : ''}`;
}

function renderMeta(c, review) {
  return `<div class="code-block">${JSON.stringify({
    contentId: c.contentId, topic: c.topic, metadata: c.metadata,
    review: review, publishSchedule: c.stages?.final?.publishSchedule
  }, null, 2)}</div>`;
}

function closeModal() { document.getElementById('detailModal').classList.remove('active'); }

async function downloadContent(contentId) {
  try {
    const res = await fetch(`${API_BASE}/getContent?id=${contentId}`);
    const data = await res.json();
    if (data.success) {
      const blob = new Blob([JSON.stringify(data.content, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `${contentId}.json`; a.click();
    }
  } catch (e) { alert('다운로드 실패: ' + e.message); }
}

// ════════════════════════════════════════
// Kill Switch
// ════════════════════════════════════════
async function toggleKillSwitch() {
  const el = document.getElementById('killSwitch');
  const newState = !el.classList.contains('off');
  try {
    await fetch(`${API_BASE}/systemStatus`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ killSwitch: newState })
    });
    el.className = newState ? 'toggle off' : 'toggle';
  } catch (e) { alert('Kill Switch 변경 실패'); }
}

// ── 초기화 ──
init();
</script>
