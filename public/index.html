<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videoto — 콘텐츠 자동 생성 관리</title>
<style>
  :root {
    --primary: #1a56db; --primary-light: #2563eb; --success: #059669;
    --warning: #d97706; --danger: #dc2626; --bg: #f8fafc; --surface: #ffffff;
    --surface2: #f1f5f9; --text: #1e293b; --text-dim: #64748b; --border: #e2e8f0;
    --terminal-bg: #1e293b; --terminal-text: #e2e8f0;
  }
  body.dark-mode {
    --primary: #1a56db; --primary-light: #3b82f6; --success: #059669;
    --warning: #d97706; --danger: #dc2626; --bg: #0f172a; --surface: #1e293b;
    --surface2: #334155; --text: #f1f5f9; --text-dim: #94a3b8; --border: #475569;
    --terminal-bg: #0f172a; --terminal-text: #e2e8f0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .header h1 { font-size: 18px; font-weight: 700; white-space: nowrap; }
  .header h1 span { color: var(--primary-light); }
  .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .kill-switch { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .toggle { width: 44px; height: 24px; background: var(--success); border-radius: 12px; position: relative; cursor: pointer; transition: .3s; }
  .toggle.off { background: var(--danger); }
  .toggle::after { content: ''; width: 20px; height: 20px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: .3s; }
  .toggle.off::after { left: 22px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border-radius: 12px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  body.dark-mode .stat-card { box-shadow: none; }
  .stat-card .label { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
  .stat-card .value { font-size: 28px; font-weight: 800; }
  .stat-card .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .panel { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 24px; overflow: hidden; }
  .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .panel-header h2 { font-size: 16px; font-weight: 600; }
  .panel-body { padding: 20px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; font-size: 13px; color: var(--text-dim); font-weight: 500; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; font-size: 14px; border-bottom: 1px solid rgba(71,85,105,.3); }
  tr:hover td { background: rgba(59,130,246,.05); }
  .badge { padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; display: inline-block; }
  .badge-published { background: rgba(5,150,105,.12); color: #047857; }
  .badge-generated { background: rgba(217,119,6,.12); color: #b45309; }
  .badge-pending { background: rgba(139,92,246,.12); color: #7c3aed; }
  .badge-approved { background: rgba(59,130,246,.12); color: #1d4ed8; }
  .badge-hold { background: rgba(100,116,139,.12); color: #475569; }
  .badge-rejected { background: rgba(220,38,38,.12); color: #dc2626; }
  .badge-error { background: rgba(220,38,38,.12); color: #dc2626; }
  body.dark-mode .badge-published { background: rgba(5,150,105,.15); color: #34d399; }
  body.dark-mode .badge-generated { background: rgba(217,119,6,.15); color: #fbbf24; }
  body.dark-mode .badge-pending { background: rgba(139,92,246,.15); color: #a78bfa; }
  body.dark-mode .badge-approved { background: rgba(59,130,246,.15); color: #60a5fa; }
  body.dark-mode .badge-hold { background: rgba(148,163,184,.15); color: #94a3b8; }
  body.dark-mode .badge-rejected { background: rgba(220,38,38,.15); color: #f87171; }
  body.dark-mode .badge-error { background: rgba(220,38,38,.15); color: #f87171; }
  .btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: .2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-light); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--primary-light); color: var(--primary-light); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-success { background: var(--success); color: #fff; }
  .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .topic-item { padding: 10px 14px; background: var(--surface2); border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: .2s; font-size: 13px; }
  .topic-item:hover { border-color: var(--primary-light); }
  .topic-item.selected { border-color: var(--primary); background: rgba(26,86,219,.15); }
  .topic-item .cat { font-size: 11px; color: var(--text-dim); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--surface); border-radius: 16px; max-width: 800px; width: 90%; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border); }
  .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-body { padding: 20px; }
  .close-btn { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { padding: 8px 16px; border-radius: 8px; background: var(--surface2); color: var(--text-dim); cursor: pointer; font-size: 13px; border: none; }
  .tab.active { background: var(--primary); color: #fff; }
  .code-block { background: var(--bg); border-radius: 8px; padding: 16px; font-family: 'JetBrains Mono', monospace; font-size: 13px; overflow-x: auto; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
  .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-dim); }
  .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--primary-light); border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 터미널 로그 */
  .terminal { background: #0f172a; border-radius: 12px; border: 1px solid #334155; overflow: hidden; }
  .terminal-header { background: #1e293b; padding: 8px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #334155; }
  .terminal-dot { width: 10px; height: 10px; border-radius: 50%; }
  .terminal-dot.red { background: #ff5f56; } .terminal-dot.yellow { background: #ffbd2e; } .terminal-dot.green { background: #27c93f; }
  .terminal-title { font-size: 12px; color: #888; margin-left: 8px; }
  .terminal-body { padding: 16px; max-height: 500px; overflow-y: auto; font-family: 'JetBrains Mono', 'Consolas', 'Monaco', monospace; font-size: 14px; line-height: 1.8; scroll-behavior: smooth; }
  .log-line { padding: 5px 10px; white-space: pre-wrap; word-break: break-word; border-radius: 4px; margin: 2px 0; line-height: 1.7; }
  .log-time { color: #94a3b8; font-size: 12px; font-family: monospace; }
  .log-icon { margin: 0 4px; }
  .log-msg { color: #f1f5f9; font-size: 14px; font-weight: 500; }
  .log-detail { color: #cbd5e1; padding-left: 32px; font-size: 13px; line-height: 1.6; margin: 2px 0; }
  .log-data { color: #3b82f6; padding-left: 32px; font-size: 11px; }
  .log-separator { border-top: 1px dashed #475569; margin: 8px 0; }
  .log-line.running .log-msg { color: #60a5fa; }
  .log-line.done { background: rgba(52,211,153,0.08); }
  .log-line.done .log-msg { color: #34d399; font-weight: 600; }
  .log-line.error { background: rgba(248,113,113,0.08); }
  .log-line.error .log-msg { color: #f87171; font-weight: 600; }
  .log-line.warn .log-msg { color: #fbbf24; }
  .terminal-footer { padding: 8px 16px; background: #1e293b; border-top: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #94a3b8; }
  .progress-mini { height: 3px; background: #333; border-radius: 2px; flex: 1; margin: 0 12px; }
  .progress-mini-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); border-radius: 2px; transition: width .5s; }

  /* 주제관리 */
  .topic-manage { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .topic-row { display: flex; gap: 8px; align-items: center; padding: 8px 12px; background: var(--surface2); border-radius: 8px; }
  .topic-row input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 13px; }
  .topic-row input.w-cat { width: 80px; }
  .topic-row input.w-title { flex: 1; min-width: 120px; }
  .topic-row input.w-hook { flex: 1; min-width: 150px; }

  /* 검수 패널 */
  .review-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .review-item h4 { font-size: 14px; margin-bottom: 8px; }
  .review-item .preview { color: var(--text-dim); font-size: 13px; margin-bottom: 10px; }
  .review-btns { display: flex; gap: 8px; margin-bottom: 8px; }
  .review-btns button { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 13px; }
  .review-btns button.active-good { background: rgba(5,150,105,.2); border-color: #34d399; color: #34d399; }
  .review-btns button.active-edit { background: rgba(217,119,6,.2); border-color: #fbbf24; color: #fbbf24; }
  .review-btns button.active-reject { background: rgba(220,38,38,.2); border-color: #f87171; color: #f87171; }
  .review-memo { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 12px; margin-top: 6px; }
  .naver-modal { background: var(--surface); border-radius: 12px; padding: 24px; max-width: 400px; width: 90%; }
  .naver-modal input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 14px; margin: 4px 0 12px; }

  /* 상품 선택 바 */
  .product-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; gap: 8px; align-items: center; overflow-x: auto; }
  .product-tab { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-dim); transition: .2s; white-space: nowrap; }
  .product-tab:hover { border-color: var(--primary-light); color: var(--primary-light); }
  .product-tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
  .product-tab .day { font-size: 10px; color: inherit; opacity: 0.7; margin-left: 4px; }

  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr 1fr; }
    .topic-grid { grid-template-columns: 1fr; }
    .topic-row { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📹 <span>Videoto</span> — 콘텐츠 자동 생성</h1>
  <div class="header-actions">
    <div class="kill-switch">
      <span>시스템</span>
      <div class="toggle" id="killSwitch" onclick="toggleKillSwitch()"></div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="openGeneratePanel()">➕ 생성</button>
    <button class="btn btn-outline btn-sm" onclick="openTopicManager()">📝 주제</button>
    <button class="btn btn-outline btn-sm" id="themeToggle" onclick="toggleTheme()" title="라이트/다크 모드 전환">🌙</button>
  </div>
</div>

<!-- 상품 선택 바 -->
<div class="product-bar" id="productBar">
  <button class="product-tab active" onclick="selectProduct('conhome')">🏠 컨설턴트홈페이지 <span class="day">화</span></button>
  <button class="product-tab" onclick="selectProduct('corphome')">🏢 기업홈페이지 <span class="day">월</span></button>
  <button class="product-tab" onclick="selectProduct('innercircle')">🔵 이너서클멤버십 <span class="day">수</span></button>
  <button class="product-tab" onclick="selectProduct('jarvia')">🟣 자비아멤버십 <span class="day">목</span></button>
  <button class="product-tab" onclick="selectProduct('taxnavi')">📊 택스나비 <span class="day">금</span></button>
</div>

<div class="container">
  <div class="grid" id="stats">
    <div class="stat-card"><div class="label">총 콘텐츠</div><div class="value" id="statTotal">-</div><div class="sub">최근 조회 기준</div></div>
    <div class="stat-card"><div class="label">게시 완료</div><div class="value" id="statPublished" style="color:var(--success)">-</div><div class="sub">최근 조회 기준</div></div>
    <div class="stat-card"><div class="label">대기 중</div><div class="value" id="statPending" style="color:var(--warning)">-</div><div class="sub">검수/게시 대기</div></div>
    <div class="stat-card"><div class="label">다음 주제</div><div class="value" id="statNextTopic" style="font-size:16px;">-</div><div class="sub" id="statNextTopicSub">-</div></div>
  </div>

  <!-- 터미널 로그 패널 -->
  <div id="progressPanel" style="display:none; margin-bottom:24px;">
    <div class="terminal">
      <div class="terminal-header">
        <div class="terminal-dot red"></div><div class="terminal-dot yellow"></div><div class="terminal-dot green"></div>
        <span class="terminal-title" id="terminalTitle">Videoto — 콘텐츠 생성 로그</span>
      </div>
      <div class="terminal-body" id="terminalBody"></div>
      <div class="terminal-footer">
        <span id="terminalStatus">대기</span>
        <div class="progress-mini"><div class="progress-mini-fill" id="terminalProgress" style="width:0%"></div></div>
        <span id="terminalElapsed">0초</span>
        <button class="btn btn-sm" onclick="downloadLog()" style="margin-left:8px; background:#334155; color:#e2e8f0; border:1px solid #475569;">📥 로그 저장</button>
        <button class="btn btn-sm" onclick="cancelCurrentProgress()" style="margin-left:4px; background:#dc2626; color:#fff; border:1px solid #dc2626; font-weight:600;" id="btnCancelProgress">⏹️ 중단 요청</button>
        <button class="btn btn-sm" onclick="closeTerminal()" style="margin-left:4px; background:#334155; color:#e2e8f0; border:1px solid #475569;">✕ 닫기</button>
      </div>
    </div>
  </div>

  <!-- 최근 콘텐츠 -->
  <div class="panel">
    <div class="panel-header" style="display:flex;align-items:center;gap:12px;">
      <h2>📋 최근 콘텐츠</h2>
      <button class="btn btn-sm" id="btnDeleteSelected" onclick="deleteSelectedContents()" style="display:none;background:#dc2626;color:#fff;font-size:12px;">🗑️ 선택 삭제</button>
      <span style="font-size:13px; color:var(--text-dim);margin-left:auto;">최근 20개</span>
    </div>
    <div class="panel-body" style="padding:0;">
      <table>
        <thead><tr><th style="width:36px;"><input type="checkbox" id="checkAll" onchange="toggleCheckAll(this)" title="전체 선택"></th><th>콘텐츠 ID</th><th>주제</th><th>카테고리</th><th>상태</th><th>점수</th><th>소요</th><th>생성일</th><th>액션</th></tr></thead>
        <tbody id="contentTable"><tr><td colspan="9" class="loading"><div class="spinner"></div> 로딩 중...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- 수동 생성 패널 -->
  <div class="panel" id="generatePanel" style="display:none;">
    <div class="panel-header">
      <h2>➕ 수동 콘텐츠 생성 — <span id="generateProductName" style="color:var(--primary-light)">컨설턴트홈페이지</span></h2>
      <button class="btn btn-sm btn-outline" onclick="document.getElementById('generatePanel').style.display='none'">닫기</button>
    </div>
    <div class="panel-body">
      <p style="margin-bottom:12px; color:var(--text-dim);">생성할 주제를 선택하세요 (선택하지 않으면 순서대로 자동 선택)</p>
      <div class="topic-grid" id="topicGrid"></div>
      <div style="margin-top:12px; display:flex; gap:12px;">
        <button class="btn btn-primary" onclick="runGenerate()" id="generateBtn">🚀 콘텐츠 생성 시작</button>
        <span id="generateStatus" style="align-self:center; font-size:14px; color:var(--text-dim);"></span>
      </div>
    </div>
  </div>

  <!-- 주제 관리 패널 -->
  <div class="panel" id="topicPanel" style="display:none;">
    <div class="panel-header">
      <h2>📝 주제 관리</h2>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-sm btn-success" onclick="addTopic()">+ 주제 추가</button>
        <button class="btn btn-sm btn-outline" onclick="document.getElementById('topicPanel').style.display='none'">닫기</button>
      </div>
    </div>
    <div class="panel-body">
      <div id="topicManager" class="topic-manage"></div>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">콘텐츠 상세</h2>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="loading"><div class="spinner"></div> 로딩 중...</div>
    </div>
  </div>
</div>

<!-- 검수 모달 -->
<div class="modal-overlay" id="reviewModal">
  <div class="modal" style="max-width:700px;">
    <div class="modal-header">
      <h2>✍️ 게시 전 검수 — <span id="reviewContentId"></span></h2>
      <button class="close-btn" onclick="document.getElementById('reviewModal').classList.remove('active')">&times;</button>
    </div>
    <div class="modal-body" id="reviewBody">
      <div class="loading"><div class="spinner"></div> 로딩 중...</div>
    </div>
  </div>
</div>

<!-- 네이버 성과 입력 모달 -->
<div class="modal-overlay" id="naverModal">
  <div class="naver-modal">
    <h3 style="margin-bottom:16px;">📊 네이버 블로그 성과 입력</h3>
    <input type="hidden" id="naverContentId">
    <label style="font-size:13px; color:var(--text-dim);">방문수</label>
    <input type="number" id="naverVisits" placeholder="0">
    <label style="font-size:13px; color:var(--text-dim);">좋아요</label>
    <input type="number" id="naverLikes" placeholder="0">
    <label style="font-size:13px; color:var(--text-dim);">댓글수</label>
    <input type="number" id="naverComments" placeholder="0">
    <div style="display:flex; gap:8px; margin-top:8px;">
      <button class="btn btn-primary" onclick="submitNaverMetrics()">저장</button>
      <button class="btn btn-outline" onclick="document.getElementById('naverModal').classList.remove('active')">취소</button>
    </div>
  </div>
</div>

<script>
const API_BASE = 'https://asia-northeast3-kfpc-company-support-project.cloudfunctions.net';

const PRODUCTS = {
  conhome:     { id: 'conhome',     name: '컨설턴트홈페이지', day: '화', icon: '🏠' },
  corphome:    { id: 'corphome',    name: '기업홈페이지',     day: '월', icon: '🏢' },
  innercircle: { id: 'innercircle', name: '이너서클멤버십',   day: '수', icon: '🔵' },
  jarvia:      { id: 'jarvia',      name: '자비아멤버십',     day: '목', icon: '🟣' },
  taxnavi:     { id: 'taxnavi',     name: '택스나비',         day: '금', icon: '📊' },
};
let currentProductId = 'conhome';

let TOPICS = [];
let selectedTopicIndex = null;
let progressTimer = null;
let generateStartTime = null;

async function selectProduct(productId) {
  currentProductId = productId;
  document.querySelectorAll('.product-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.product-tab[onclick*="${productId}"]`).classList.add('active');

  // 터미널 숨기기 + 폴링 중지
  document.getElementById('progressPanel').style.display = 'none';
  if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }

  // 수동 생성 패널 닫기
  document.getElementById('generatePanel').style.display = 'none';
  selectedTopicIndex = null;

  // 주제 로드 → 대시보드 순차 실행
  await loadTopics();
  await loadDashboard();

  // 주제 관리 패널이 열려있으면 갱신
  if (document.getElementById('topicPanel').style.display !== 'none') renderTopicManager();
}

async function loadDashboard() {
  try {
    const statusRes = await fetch(`${API_BASE}/systemStatus?productId=${currentProductId}`);
    if (statusRes.ok) {
      const data = await statusRes.json();
      if (data.success) {
        document.getElementById('killSwitch').className = data.system.killSwitch ? 'toggle off' : 'toggle';
        const topicCount = data.system.topicCount || 0;
        if (topicCount > 0) {
          const nextIdx = data.system.currentTopicIndex % topicCount;
          document.getElementById('statNextTopic').textContent = TOPICS[nextIdx]?.title || '-';
          document.getElementById('statNextTopicSub').textContent = `#${nextIdx + 1} / ${topicCount}`;
        } else {
          document.getElementById('statNextTopic').textContent = '주제 없음';
          document.getElementById('statNextTopicSub').textContent = '주제를 먼저 등록하세요';
        }
      }
    }
  } catch (e) { console.log('시스템 상태 로드 실패'); }

  try {
    const listRes = await fetch(`${API_BASE}/listContents?limit=20&productId=${currentProductId}`);
    if (listRes.ok) {
      const data = await listRes.json();
      if (data.success) {
        const total = data.contents.length;
        const published = data.contents.filter(c => c.status === 'published').length;
        const pending = total - published;
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statPublished').textContent = published;
        document.getElementById('statPending').textContent = pending;

        const tbody = document.getElementById('contentTable');
        const productName = PRODUCTS[currentProductId]?.name || currentProductId;
        if (total === 0) {
          tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding:40px; color:var(--text-dim);">${productName}의 콘텐츠가 아직 없습니다. 수동 생성을 시작해보세요.</td></tr>`;
        } else {
          tbody.innerHTML = data.contents.map(c => {
            const statusMap = {
              'published': '<span class="badge badge-published">게시완료</span>',
              'approved': '<span class="badge badge-approved">승인됨</span>',
              'pending_review': '<span class="badge badge-pending">검수대기</span>',
              'hold': '<span class="badge badge-hold">보류</span>',
              'rejected': '<span class="badge badge-rejected">반려</span>',
              'error': '<span class="badge badge-error">에러</span>',
              'generated': '<span class="badge badge-generated">대기중</span>',
            };
            const status = statusMap[c.status] || `<span class="badge badge-generated">${c.status}</span>`;
            const date = c.createdAt ? new Date(c.createdAt._seconds ? c.createdAt._seconds * 1000 : c.createdAt).toLocaleDateString('ko') : '-';
            const score = c.metadata?.stages?.reviewed?.review?.totalScore || c.review?.totalScore || '-';
            const elapsed = c.metadata?.elapsedSeconds ? `${c.metadata.elapsedSeconds}초` : '-';
            const reviewBtn = (c.status === 'pending_review' || c.status === 'generated') ? `<button class="btn btn-sm btn-primary" onclick="openReview('${c.contentId}')">✍️ 검수</button> ` : '';
            const naverBtn = c.status === 'published' ? `<button class="btn btn-sm btn-outline" onclick="openNaverInput('${c.contentId}')">📊</button> ` : '';
            return `<tr>
              <td><input type="checkbox" class="content-check" value="${c.contentId}" onchange="updateDeleteBtn()"></td>
              <td><a href="#" onclick="showDetail('${c.contentId}');return false" style="color:var(--primary-light)">${c.contentId}</a></td>
              <td>${c.topic?.title || '-'}</td>
              <td>${c.topic?.category || '-'}</td>
              <td>${status}</td>
              <td>${score}</td>
              <td>${elapsed}</td>
              <td>${date}</td>
              <td>${reviewBtn}<button class="btn btn-sm btn-outline" onclick="showDetail('${c.contentId}')">상세</button> <button class="btn btn-sm btn-outline" onclick="showLog('${c.contentId}')">📋</button> ${naverBtn}<button class="btn btn-sm btn-outline" onclick="downloadContent('${c.contentId}')">⬇️</button></td>
            </tr>`;
          }).join('');
        }
      }
    }
  } catch (e) { document.getElementById('contentTable').innerHTML = '<tr><td colspan="9" style="text-align:center; padding:40px; color:var(--text-dim);">API 연결 대기 중... 잠시 후 새로고침하세요.</td></tr>'; }
}

async function runGenerate() {
  const btn = document.getElementById('generateBtn');
  const status = document.getElementById('generateStatus');
  btn.disabled = true;
  btn.textContent = '⏳ 생성 중...';
  status.textContent = 'AI 4개가 협업 중입니다. 약 3~4분 소요...';
  generateStartTime = Date.now();

  // 진행 상태 패널 표시
  showProgressPanel();

  const url = selectedTopicIndex !== null
    ? `${API_BASE}/manualGenerate?productId=${currentProductId}&topicIndex=${selectedTopicIndex}`
    : `${API_BASE}/manualGenerate?productId=${currentProductId}`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    stopProgressPolling();
    // 서버 완료 후 마지막 로그를 한 번 더 가져옴
    await fetchFinalLogs();
    if (data.success) {
      status.innerHTML = `✅ <strong>${data.contentId}</strong> 생성 완료! (${data.elapsed || '-'}초, ${data.score || '-'}점)`;
      updateProgressComplete(data);
      await loadDashboard();

      status.textContent = `❌ 실패: ${data.error}`;
      updateProgressError(data.error);
    }

    stopProgressPolling();
    status.textContent = `❌ 연결 실패: ${e.message}`;
    updateProgressError(e.message);

  btn.textContent = '🚀 콘텐츠 생성 시작';
}

// ════════════════════════════════════════
// 터미널 로그 시스템
// ════════════════════════════════════════
let lastLogCount = 0;
let currentContentId = null;

function showProgressPanel() {
  document.getElementById('progressPanel').style.display = 'block';
  document.getElementById('terminalBody').innerHTML = '';
  document.getElementById('terminalStatus').textContent = '서버 연결 대기 중...';
  document.getElementById('terminalProgress').style.width = '0%';
  document.getElementById('terminalElapsed').textContent = '0초';
  document.getElementById('terminalTitle').textContent = 'Videoto — 서버 시작 대기 중...';
  lastLogCount = 0;
  currentContentId = null;
  generateStartTime = Date.now();
  appendLogLine({ time: new Date().toISOString(), icon: '⏳', message: 'AI 서버에 생성 요청 전송... 서버 시작까지 5~10초 소요', step: 'init' });
  startProgressPolling();
}

let _lastLogStep = '';
function appendLogLine(entry) {
  const body = document.getElementById('terminalBody');
  const time = entry.time ? new Date(entry.time).toLocaleTimeString('ko') : '';
  const cls = entry.step === 'complete' ? 'done' : entry.icon?.includes('✅') ? 'done' : entry.icon?.includes('❌') ? 'error' : entry.icon?.includes('⚠️') ? 'warn' : 'running';

  // 주요 단계 전환 시 구분선 삽입
  const stepLabels = {
    'start': '🚀 시작',
    'stage0': '🔍 트렌드 조사', 'trend': '🔍 트렌드 조사',
    'feedback': '🧠 AI 학습',
    'stage1_shorts': '🎬 쇼츠 생성', 'stage1_carousel': '📰 카드뉴스 생성', 'stage1_blog': '📝 블로그 생성',
    'stage2': '✍️ Claude 검수', 'stage3': '📦 Gemini 최종',
    'video': '🎥 영상 생성',
    'complete': '🎉 완료'
  };
  const stepGroup = (entry.step || '').split('_')[0] || entry.step;
  if (entry.step && _lastLogStep !== stepGroup && stepLabels[entry.step]) {
    body.innerHTML += `<div class="log-separator"></div>`;
  }
  _lastLogStep = stepGroup;

  let html = `<div class="log-line ${cls}">`;
  html += `<span class="log-time">[${time}]</span> `;
  html += `<span class="log-icon">${entry.icon || ''}</span> `;
  html += `<span class="log-msg">${entry.message || ''}</span>`;
  html += `</div>`;

  if (entry.detail) {
    const detailLines = entry.detail.split('\n');
    detailLines.forEach(line => {
      html += `<div class="log-detail">→ ${line}</div>`;
    });
  }

  body.innerHTML += html;
  body.scrollTop = body.scrollHeight;
}

function startProgressPolling() {
  stopProgressPolling();
  let waitingForServer = true; // 서버가 아직 시작 안 했을 수 있음
  let serverFoundAt = null;

  progressTimer = setInterval(async () => {
    try {
      const url = currentContentId
        ? `${API_BASE}/generateProgress?id=${currentContentId}`
        : `${API_BASE}/generateProgress`;
      const res = await fetch(url);
      if (res.ok) {
        const data = await res.json();

        // 서버가 아직 progress를 안 만들었으면 대기
        if (!data.success || !data.progress) {
          if (waitingForServer) {
            const waited = Math.round((Date.now() - generateStartTime) / 1000);
            document.getElementById('terminalStatus').textContent = `서버 연결 대기 중... (${waited}초)`;
            if (waited > 300) { // 5분 넘으면 타임아웃
              appendLogLine({ time: new Date().toISOString(), icon: '❌', message: '서버 응답 타임아웃 (5분)', step: 'error' });
              stopProgressPolling();
            }
          }
          return;
        }

        const p = data.progress;

        // 서버가 진행 중인 작업을 반환했으면 추적 시작
        if (waitingForServer && p.contentId) {
          waitingForServer = false;
          serverFoundAt = Date.now();
          currentContentId = p.contentId;
          appendLogLine({ time: new Date().toISOString(), icon: '🔗', message: `서버 연결됨 — ${p.contentId}`, step: 'init' });
        }

        if (p.contentId) currentContentId = p.contentId;
        document.getElementById('terminalTitle').textContent = `Videoto — ${p.topic?.title || '콘텐츠 생성'} (${p.contentId || ''})`;

        // 새 로그만 추가
        const logs = p.logs || [];
        if (logs.length > lastLogCount) {
          for (let i = lastLogCount; i < logs.length; i++) {
            appendLogLine(logs[i]);
          }
          lastLogCount = logs.length;
        }

        // 프로그레스바 — 서버가 계산한 percent 사용
        const pct = p.percent || 0;
        document.getElementById('terminalProgress').style.width = pct + '%';

        // 상태 판단 — 서버 찾은 후 10초 이내에는 done 무시 (중간 기록일 수 있음)
        if (p.currentStatus === 'done' || p.currentStatus === 'failed') {
          const sinceFund = serverFoundAt ? (Date.now() - serverFoundAt) / 1000 : 999;
          if (sinceFund > 10) {
            const statusText = p.currentStatus === 'done' ? '✅ 완료!' : '❌ 실패';
            document.getElementById('terminalStatus').textContent = statusText;
            document.getElementById('terminalProgress').style.width = '100%';
            stopProgressPolling();
          }
        } else {
          document.getElementById('terminalStatus').textContent = p.currentMessage || '진행 중...';
        }
      }
    } catch (e) { /* 네트워크 오류 무시 — 다음 폴링에서 재시도 */ }

    // 경과 시간
    if (generateStartTime) {
      const elapsed = Math.round((Date.now() - generateStartTime) / 1000);
      document.getElementById('terminalElapsed').textContent = `${elapsed}초`;
    }
  }, 2000);
}

function stopProgressPolling() {
  if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
}

// 서버 완료 후 마지막 로그를 전부 가져오는 함수
async function fetchFinalLogs() {
  if (!currentContentId) return;
  try {
    // 최대 3회 시도 (로그 기록 지연 대비)
    for (let attempt = 0; attempt < 3; attempt++) {
      await new Promise(r => setTimeout(r, 1000)); // 1초 대기
      const res = await fetch(`${API_BASE}/generateProgress?id=${currentContentId}`);
      if (!res.ok) continue;
      const data = await res.json();
      if (!data.success || !data.progress) continue;
      const logs = data.progress.logs || [];
      if (logs.length > lastLogCount) {
        for (let i = lastLogCount; i < logs.length; i++) {
          appendLogLine(logs[i]);
        }
        lastLogCount = logs.length;
      }
      // 모든 로그를 가져왔으면 종료
      if (data.progress.currentStatus === 'done' || data.progress.currentStatus === 'failed') break;
    }
  } catch (e) { /* 무시 */ }
}

function updateProgressComplete(data) {
  document.getElementById('terminalStatus').textContent = '✅ 완료!';
  document.getElementById('terminalProgress').style.width = '100%';
  const elapsed = data.elapsed || Math.round((Date.now() - generateStartTime) / 1000);
  document.getElementById('terminalElapsed').textContent = `${elapsed}초 (${data.score || '-'}점)`;
}

function updateProgressError(error) {
  document.getElementById('terminalStatus').textContent = '❌ 실패';
  appendLogLine({ time: new Date().toISOString(), icon: '❌', message: `에러: ${error}`, step: 'error' });
}

async function checkActiveProgress() {
  try {
    const res = await fetch(`${API_BASE}/generateProgress`);
    if (res.ok) {
      const data = await res.json();
      if (data.success && data.progress && data.progress.currentStatus === 'running') {
        const progressId = data.progress.contentId || data.progress.id || '';
        // 현재 상품의 작업만 표시 (다른 상품 작업이면 무시)
        if (progressId.includes(currentProductId) || (!progressId.includes('corphome') && !progressId.includes('innercircle') && !progressId.includes('jarvia') && !progressId.includes('taxnavi') && currentProductId === 'conhome')) {
          currentContentId = progressId;
          generateStartTime = new Date(data.progress.startedAt || data.progress.updatedAt).getTime();
          document.getElementById('progressPanel').style.display = 'block';
          (data.progress.logs || []).forEach(entry => appendLogLine(entry));
          lastLogCount = (data.progress.logs || []).length;
          startProgressPolling();
        }
      }
    }
  } catch (e) { /* 무시 */ }
}

function downloadLog() {
  const body = document.getElementById('terminalBody');
  const text = body.innerText;
  const blob = new Blob([text], { type: 'text/plain; charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `videoto_log_${currentContentId || 'unknown'}.txt`;
  a.click();
}

// 콘텐츠 상세에서 로그 보기
async function showLog(contentId) {
  try {
    const res = await fetch(`${API_BASE}/generateProgress?id=${contentId}`);
    if (res.ok) {
      const data = await res.json();
      if (data.success && data.progress) {
        currentContentId = contentId;
        document.getElementById('progressPanel').style.display = 'block';
        document.getElementById('terminalBody').innerHTML = '';
        document.getElementById('terminalTitle').textContent = `Videoto — ${data.progress.topic?.title || ''} (${contentId})`;
        lastLogCount = 0;
        (data.progress.logs || []).forEach(entry => appendLogLine(entry));
        lastLogCount = (data.progress.logs || []).length;
        const summary = data.progress.summary;
        if (summary) {
          document.getElementById('terminalStatus').textContent = '완료';
          document.getElementById('terminalProgress').style.width = '100%';
          document.getElementById('terminalElapsed').textContent = `${summary.elapsed}초 (${summary.score}점)`;
        }
        document.getElementById('progressPanel').scrollIntoView({ behavior: 'smooth' });
      }
    }
  } catch (e) { alert('로그 로드 실패: ' + e.message); }
}

async function saveTopic(idx) {
  const topic = TOPICS[idx];
  const category = document.getElementById(`cat_${idx}`).value.trim();
  const title = document.getElementById(`title_${idx}`).value.trim();
  const hook = document.getElementById(`hook_${idx}`).value.trim();
  if (!title) { alert('주제 제목을 입력하세요.'); return; }
  const btn = document.querySelector(`#topicRow_${idx} .btn-primary`);
  btn.textContent = '저장 중...'; btn.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/topicUpdate`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'edit', topic: { id: topic.id, category, title, hook }, productId: currentProductId })
    });
    const data = await res.json();
    if (data.success) {
      TOPICS[idx] = { ...topic, category, title, hook };
      btn.textContent = '✅ 완료'; setTimeout(() => { btn.textContent = '저장'; btn.disabled = false; }, 1500);
      renderTopicGrid();
    } else { alert('저장 실패: ' + (data.error || '')); btn.textContent = '저장'; btn.disabled = false; }
  } catch (e) { alert('저장 실패: ' + e.message); btn.textContent = '저장'; btn.disabled = false; }
}

async function saveNewTopic() {
  const category = document.getElementById('cat_new').value.trim();
  const title = document.getElementById('title_new').value.trim();
  const hook = document.getElementById('hook_new').value.trim();
  if (!title) { alert('주제 제목을 입력하세요.'); return; }
  if (!category) { alert('카테고리를 입력하세요.'); return; }
  const btn = document.querySelector('#topicRow_new .btn-success');
  btn.textContent = '추가 중...'; btn.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/topicUpdate`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'add', topic: { category, title, hook }, productId: currentProductId })
    });
    const data = await res.json();
    if (data.success) {
      await loadTopics();
      renderTopicManager();
      renderTopicGrid();
    } else { alert('추가 실패: ' + (data.error || '')); btn.textContent = '추가'; btn.disabled = false; }
  } catch (e) { alert('추가 실패: ' + e.message); btn.textContent = '추가'; btn.disabled = false; }
}

function addTopic() {

  document.getElementById('topicPanel').style.display = 'block';

async function deleteTopic(topicId, idx) {

    const res = await fetch(`${API_BASE}/topicUpdate`, {

      body: JSON.stringify({ action: 'delete', topic: { id: topicId }, productId: currentProductId })
    });

    if (data.success) {
      await loadTopics();
      renderTopicManager();
      renderTopicGrid();

}

async function showDetail(contentId) {
  const modal = document.getElementById('detailModal');
  const body = document.getElementById('modalBody');
  modal.classList.add('active');
  document.getElementById('modalTitle').textContent = contentId;
  body.innerHTML = '<div class="loading"><div class="spinner"></div> 로딩 중...</div>';
  try {
    const res = await fetch(`${API_BASE}/getContent?id=${contentId}`);
    const data = await res.json();
    if (data.success && data.content) {
      const c = data.content;
      const final = c.stages?.final || c.finalContent || {};
      if (c.finalContent?.carousel?.imageUrls && final.carousel) { final.carousel.imageUrls = c.finalContent.carousel.imageUrls; }
      const review = c.stages?.reviewed?.review || {};
      body.innerHTML = `
        <div class="tabs">
          <button class="tab active" onclick="showTab('shorts',this)">🎬 쇼츠</button>
          <button class="tab" onclick="showTab('carousel',this)">📰 카드뉴스</button>
          <button class="tab" onclick="showTab('blog',this)">📝 블로그</button>
          <button class="tab" onclick="showTab('log',this)">📋 생성 로그</button>
          <button class="tab" onclick="showTab('meta',this)">📊 메타/AI학습</button>
          <button class="tab" onclick="showTab('perf',this)">📈 성과</button>
        </div>
        <div id="tab_shorts">${renderShorts(final.shorts)}${renderVideoUrls(c.videoUrls)}</div>
        <div id="tab_carousel" style="display:none">${renderCarousel(final.carousel)}</div>
        <div id="tab_blog" style="display:none">${renderBlog(final.blog)}</div>
        <div id="tab_log" style="display:none"><div id="modalLogArea" style="background:#0c0c0c; border-radius:8px; padding:16px; max-height:400px; overflow-y:auto; font-family:monospace; font-size:13px; line-height:1.7; color:#e2e8f0;">로그 로드 중...</div>
          <button class="btn btn-sm btn-outline" onclick="downloadLogById('${contentId}')" style="margin-top:8px;">📥 로그 파일 저장</button></div>
        <div id="tab_meta" style="display:none">${renderMeta(c, review)}</div>
        <div id="tab_perf" style="display:none">성과 로딩 중...</div>
      `;

function showTab(name, el) {
  document.querySelectorAll('[id^="tab_"]').forEach(t => t.style.display = 'none');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab_' + name).style.display = 'block';
  el.classList.add('active');
}

function renderShorts(s) {
  if (!s) return '<p>쇼츠 데이터 없음</p>';
  const scenes = (s.scenes || []).map(sc => `<div style="padding:8px 0; border-bottom:1px solid var(--border);">
    <strong>${sc.time}</strong> [${sc.type}]<br>
    <span style="color:#fbbf24;">자막: ${sc.subtitle || '-'}</span><br>
    <span style="color:var(--text-dim);">나레이션: ${sc.narration || '-'}</span><br>
    <span style="font-size:12px; color:#64748b;">비주얼: ${sc.visual || '-'}</span>
  </div>`).join('');
  return `<h3 style="margin-bottom:12px;">${s.title || '제목 없음'}</h3>
    ${s.description ? `<p style="color:var(--text-dim); margin-bottom:12px;">${s.description}</p>` : ''}
    ${s.thumbnailText ? `<p>썸네일: <strong>${s.thumbnailText}</strong></p>` : ''}
    <div style="margin-top:12px;">${scenes}</div>
    ${s.hashtags ? `<p style="margin-top:12px; color:var(--primary-light);">${s.hashtags.join(' ')}</p>` : ''}`;
}

// 영상 URL 표시 (상세 모달의 쇼츠 탭 하단)
function renderVideoUrls(videoUrls) {
  if (!videoUrls) return '';
  const shortsUrl = videoUrls.shorts || null;
  const landscapeUrl = videoUrls.landscape || null;
  if (!shortsUrl && !landscapeUrl) return '';
  return `<div style="margin-top:16px; padding:12px; background:var(--bg); border-radius:8px; border:1px solid var(--border);">
    <h4 style="margin-bottom:8px; font-size:14px;">🎬 생성된 영상</h4>
    ${shortsUrl ? `<p style="margin:4px 0;"><span style="color:var(--text-dim); font-size:12px;">세로(쇼츠/릴스):</span> <a href="${shortsUrl}" target="_blank" style="color:var(--primary-light); font-size:13px;">▶ 미리보기</a></p>` : ''}
    ${landscapeUrl ? `<p style="margin:4px 0;"><span style="color:var(--text-dim); font-size:12px;">가로(블로그 임베드):</span> <a href="${landscapeUrl}" target="_blank" style="color:var(--primary-light); font-size:13px;">▶ 미리보기</a></p>` : ''}
  </div>`;
}

function renderCarousel(c) {
  if (!c) return '<p>카드뉴스 데이터 없음</p>';
  const slides = (c.slides || []).map(sl => `<div style="padding:10px 0; border-bottom:1px solid var(--border);">
    <span style="font-size:11px; color:var(--text-dim); font-weight:500;">${sl.type || ''} — ${sl.page}장</span>
    <div style="font-size:15px; font-weight:700; margin:4px 0;">${sl.headline || ''}</div>
    <div style="font-size:13px; color:var(--text-dim);">${sl.body || ''}</div>
  </div>`).join('');

  // 카드뉴스 PNG 이미지 미리보기
  const images = (c.imageUrls || []).length > 0
    ? `<div style="margin:16px 0;">
        <h4 style="margin-bottom:8px; font-size:14px;">📸 생성된 카드 이미지</h4>
        <div style="display:flex; gap:8px; overflow-x:auto; padding:4px 0;">
          ${c.imageUrls.map((url, i) => `<img src="${url}" alt="슬라이드 ${i+1}" style="width:120px; height:120px; object-fit:cover; border-radius:8px; border:1px solid var(--border); flex-shrink:0; cursor:pointer;" onclick="window.open('${url}','_blank')">`).join('')}
        </div>
      </div>` : '';

  return `<h3 style="margin-bottom:12px;">${c.title || ''}</h3>
    ${c.caption ? `<p style="color:var(--text-dim); margin-bottom:12px;">${c.caption}</p>` : ''}
    ${images}
    ${slides}`;
}

function renderBlog(b) {
  if (!b) return '<p>블로그 데이터 없음</p>';
  return `<h3 style="margin-bottom:8px;">${b.title || ''}</h3>
    <p style="color:var(--text-dim); margin-bottom:16px;">${b.metaDescription || ''}</p>
    <div style="background:var(--bg); padding:16px; border-radius:8px; line-height:1.8;">${b.htmlBody || b.body || ''}</div>
    ${b.tags ? `<p style="margin-top:12px; color:var(--primary-light);">${b.tags.map(t => '#'+t).join(' ')}</p>` : ''}`;
}

function renderMeta(c, review) {
  return `<div class="code-block">${JSON.stringify({
    contentId: c.contentId, topic: c.topic, metadata: c.metadata,
    review: review, publishSchedule: c.stages?.final?.publishSchedule
  }, null, 2)}</div>`;
}

function closeModal() { document.getElementById('detailModal').classList.remove('active'); }

let reviewData = { shorts: {}, carousel: {}, blog: {} };

async function openReview(contentId) {
  const modal = document.getElementById('reviewModal');
  const body = document.getElementById('reviewBody');
  document.getElementById('reviewContentId').textContent = contentId;
  modal.classList.add('active');
  body.innerHTML = '<div class="loading"><div class="spinner"></div> 콘텐츠 로딩 중...</div>';
  reviewData = { shorts: {}, carousel: {}, blog: {} };

  try {
    const res = await fetch(`${API_BASE}/getContent?id=${contentId}`);
    const data = await res.json();

    const c = data.content;

    const blog = final.blog || {};

    body.innerHTML = `
      <div class="review-item">
        <h4>🎬 쇼츠</h4>
        <div class="preview">
          <strong>제목:</strong> ${shorts.title || '-'}<br>
          <strong>후킹:</strong> ${shorts.scenes?.[0]?.subtitle || '-'}<br>
          <strong>씬:</strong> ${shorts.scenes?.length || 0}개
        </div>
        <div class="review-btns" id="reviewBtns_shorts">
          <button onclick="setRating('shorts','good',this)">👍 좋음</button>
          <button onclick="setRating('shorts','edit',this)">✏️ 수정필요</button>
          <button onclick="setRating('shorts','reject',this)">👎 반려</button>
        </div>
        <input class="review-memo" id="reviewMemo_shorts" placeholder="수정 메모 (선택사항)">
      </div>

      <div class="review-item">
        <h4>📰 카드뉴스</h4>
        <div class="preview">
          <strong>표지:</strong> ${carousel.slides?.[0]?.headline || '-'}<br>
          <strong>장수:</strong> ${carousel.slides?.length || 0}장
        </div>
        <div class="review-btns" id="reviewBtns_carousel">
          <button onclick="setRating('carousel','good',this)">👍 좋음</button>
          <button onclick="setRating('carousel','edit',this)">✏️ 수정필요</button>
          <button onclick="setRating('carousel','reject',this)">👎 반려</button>
        </div>
        <input class="review-memo" id="reviewMemo_carousel" placeholder="수정 메모 (선택사항)">
      </div>

      <div class="review-item">
        <h4>📝 블로그</h4>
        <div class="preview">
          <strong>제목:</strong> ${blog.title || '-'}<br>
          <strong>분량:</strong> ${(blog.htmlBody || blog.body || '').replace(/<[^>]+>/g, '').length}자
        </div>
        <div class="review-btns" id="reviewBtns_blog">
          <button onclick="setRating('blog','good',this)">👍 좋음</button>
          <button onclick="setRating('blog','edit',this)">✏️ 수정필요</button>
          <button onclick="setRating('blog','reject',this)">👎 반려</button>
        </div>
        <input class="review-memo" id="reviewMemo_blog" placeholder="수정 메모 (선택사항)">
      </div>

      <div style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border);">
        <label style="font-size:13px; color:var(--text-dim);">종합 메모 (선택)</label>
        <input class="review-memo" id="reviewMemoGeneral" placeholder="전체적인 피드백" style="margin-top:4px;">
        <div style="display:flex; gap:10px; margin-top:16px;">
          <button class="btn btn-primary" onclick="submitReview('${contentId}', 'approved')">✅ 전체 승인 → 게시</button>
          <button class="btn btn-outline" onclick="submitReview('${contentId}', 'hold')">⏸️ 보류</button>
          <button class="btn btn-danger" onclick="submitReview('${contentId}', 'regenerate')">🔄 AI 재생성</button>
        </div>
      </div>
    `;
  } catch (e) { body.innerHTML = `<p>로드 실패: ${e.message}</p>`; }
}

function setRating(type, rating, btn) {
  reviewData[type].rating = rating;
  const btns = btn.parentElement.querySelectorAll('button');
  btns.forEach(b => b.className = '');
  if (rating === 'good') btn.className = 'active-good';
  else if (rating === 'edit') btn.className = 'active-edit';
  else btn.className = 'active-reject';
}

async function submitReview(contentId, decision) {
  const shorts = { rating: reviewData.shorts.rating || 'good', memo: document.getElementById('reviewMemo_shorts')?.value || '' };
  const carousel = { rating: reviewData.carousel.rating || 'good', memo: document.getElementById('reviewMemo_carousel')?.value || '' };
  const blog = { rating: reviewData.blog.rating || 'good', memo: document.getElementById('reviewMemo_blog')?.value || '' };
  const memo = document.getElementById('reviewMemoGeneral')?.value || '';

  try {
    const res = await fetch(`${API_BASE}/humanReview`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contentId, shorts, carousel, blog, decision, memo })
    });
    const data = await res.json();
    if (data.success) {
      const labels = { approved: '승인 완료! 10:00에 자동 게시됩니다.', hold: '보류 처리되었습니다.', regenerate: '반려 처리되었습니다.' };
      alert(`✅ ${labels[decision] || '처리 완료'}`);
      document.getElementById('reviewModal').classList.remove('active');
      await loadDashboard();
    } else { alert('처리 실패: ' + (data.error || '')); }
  } catch (e) { alert('서버 연결 실패: ' + e.message); }
}

function openNaverInput(contentId) {
  document.getElementById('naverContentId').value = contentId;
  document.getElementById('naverVisits').value = '';
  document.getElementById('naverLikes').value = '';
  document.getElementById('naverComments').value = '';
  document.getElementById('naverModal').classList.add('active');
}

async function submitNaverMetrics() {
  const contentId = document.getElementById('naverContentId').value;
  const visits = parseInt(document.getElementById('naverVisits').value) || 0;
  const likes = parseInt(document.getElementById('naverLikes').value) || 0;
  const comments = parseInt(document.getElementById('naverComments').value) || 0;

  try {
    const res = await fetch(`${API_BASE}/naverMetrics`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contentId, visits, likes, comments })
    });
    const data = await res.json();
    if (data.success) {
      alert(`✅ 네이버 성과 저장 완료 (종합: ${data.engagementScore}점)`);
      document.getElementById('naverModal').classList.remove('active');
    } else { alert('저장 실패: ' + (data.error || '')); }
  } catch (e) { alert('서버 연결 실패: ' + e.message); }
}

async function loadModalLog(contentId) {
  try {
    const res = await fetch(`${API_BASE}/generateProgress?id=${contentId}`);
    if (res.ok) {
      const data = await res.json();
      if (data.success && data.progress?.logs) {
        const area = document.getElementById('modalLogArea');
        area.innerHTML = data.progress.logs.map(entry => {
          const time = entry.time ? new Date(entry.time).toLocaleTimeString('ko') : '';
          const color = entry.icon?.includes('✅') || entry.icon === '🎉' ? '#34d399' : entry.icon?.includes('❌') ? '#f87171' : entry.icon?.includes('⚠️') ? '#fbbf24' : '#60a5fa';
          let html = `<div style="padding:2px 0;"><span style="color:#666;">[${time}]</span> <span>${entry.icon||''}</span> <span style="color:${color};">${entry.message||''}</span></div>`;
          if (entry.detail) {
            entry.detail.split('\n').forEach(line => {
              html += `<div style="padding-left:80px; color:#64748b; font-size:12px;">→ ${line}</div>`;
            });
          }
          return html;
        }).join('');
        // AI 학습 데이터
        if (data.progress.aiLearning) {
          area.innerHTML += `<div style="margin-top:12px; padding-top:12px; border-top:1px solid #333; color:#3b82f6; font-size:11px;">[AI 학습 데이터] 후킹패턴: ${data.progress.aiLearning.shortsHookPattern || '-'} | 점수: ${data.progress.aiLearning.reviewScore || '-'} | 이슈: ${data.progress.aiLearning.reviewIssues?.length || 0}건</div>`;
        }
      } else {
        document.getElementById('modalLogArea').innerHTML = '<span style="color:#666;">이 콘텐츠의 생성 로그가 없습니다.</span>';
      }
    }
  } catch (e) { document.getElementById('modalLogArea').innerHTML = `<span style="color:#f87171;">로그 로드 실패: ${e.message}</span>`; }
}

async function downloadLogById(contentId) {
  try {
    const res = await fetch(`${API_BASE}/generateProgress?id=${contentId}`);
    if (res.ok) {
      const data = await res.json();
      const blob = new Blob([JSON.stringify(data.progress, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `videoto_log_${contentId}.json`; a.click();
    }
  } catch (e) { alert('다운로드 실패: ' + e.message); }
}

async function loadPerfTab(contentId) {
  const tab = document.getElementById('tab_perf');
  if (!tab) return;
  try {
    const res = await fetch(`${API_BASE}/getContent?id=${contentId}`);
    const data = await res.json();
    const perf = data.content?.performance || {};
    const hr = data.content?.humanReview || {};

    let html = '';

    // 담당자 검수 결과
    if (hr.reviewer) {
      html += `<h3 style="margin-bottom:12px;">👤 담당자 검수</h3>
        <table style="width:100%; border-collapse:collapse; margin-bottom:16px;">
          <tr><th style="padding:6px 10px; text-align:left; border-bottom:1px solid var(--border); font-size:12px; color:var(--text-dim);">항목</th><th style="padding:6px 10px; text-align:left; border-bottom:1px solid var(--border); font-size:12px; color:var(--text-dim);">판정</th><th style="padding:6px 10px; text-align:left; border-bottom:1px solid var(--border); font-size:12px; color:var(--text-dim);">메모</th></tr>
          <tr><td style="padding:6px 10px; border-bottom:1px solid rgba(71,85,105,.3);">쇼츠</td><td>${hr.shorts?.rating || '-'}</td><td>${hr.shorts?.memo || '-'}</td></tr>
          <tr><td style="padding:6px 10px; border-bottom:1px solid rgba(71,85,105,.3);">카드뉴스</td><td>${hr.carousel?.rating || '-'}</td><td>${hr.carousel?.memo || '-'}</td></tr>
          <tr><td style="padding:6px 10px; border-bottom:1px solid rgba(71,85,105,.3);">블로그</td><td>${hr.blog?.rating || '-'}</td><td>${hr.blog?.memo || '-'}</td></tr>
        </table>
        <p style="font-size:12px; color:var(--text-dim);">종합: ${hr.decision || '-'} | 검수자: ${hr.reviewer} | ${hr.reviewedAt ? new Date(hr.reviewedAt).toLocaleString('ko') : '-'}</p>
        <hr style="border:none; border-top:1px solid var(--border); margin:16px 0;">`;
    }

    // 성과 데이터
    if (perf.engagementScore > 0) {

function toggleTheme() {

  document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('videoto-theme', isDark ? 'dark' : 'light');
}
function loadTheme() {
  const saved = localStorage.getItem('videoto-theme');
  if (saved === 'dark') {
    document.body.classList.add('dark-mode');
    document.getElementById('themeToggle').textContent = '☀️';
  }
}

// 터미널 제어 (중단 요청 + 닫기)
// ════════════════════════════════════════
let currentProgressId = null; // alias for currentContentId

async function cancelCurrentProgress() {
  const targetId = currentContentId || currentProgressId;
  if (!targetId) {
    // 현재 진행 중인 작업 ID 가져오기
    try {
      const res = await fetch(`${API_BASE}/generateProgress`);
      const data = await res.json();
      if (data.progress?.id) { currentProgressId = data.progress.id; }
      else { alert('진행 중인 작업이 없습니다.'); return; }
    } catch (e) { alert('상태 조회 실패'); return; }
  }
  const cancelId = currentContentId || currentProgressId;
  if (!confirm(`${cancelId} 작업을 중단 요청하시겠습니까?\n※ 이미 진행 중인 AI 호출은 완료될 수 있습니다.`)) return;
  try {
    const res = await fetch(`${API_BASE}/cancelProgress`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contentId: cancelId })
    });
    const data = await res.json();
    if (data.success) {
      alert('✅ 중단 요청 완료');
      if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
      document.getElementById('terminalStatus').textContent = '중단 요청됨';
      document.getElementById('terminalProgress').style.width = '0%';
      currentProgressId = null;
    } else { alert('종료 실패: ' + (data.error || '')); }
  } catch (e) { alert('서버 연결 실패: ' + e.message); }
}

function closeTerminal() {
  if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
  document.getElementById('progressPanel').style.display = 'none';
  currentProgressId = null;
}

// Kill Switch
// ════════════════════════════════════════
async function toggleKillSwitch() {
  const el = document.getElementById('killSwitch');
  const newState = !el.classList.contains('off');
  try {
    await fetch(`${API_BASE}/systemStatus`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ killSwitch: newState })
    });
    el.className = newState ? 'toggle off' : 'toggle';
  } catch (e) { alert('Kill Switch 변경 실패'); }
}

// ════════════════════════════════════════
// 콘텐츠 선택 삭제
// ════════════════════════════════════════
function toggleCheckAll(el) {
  document.querySelectorAll('.content-check').forEach(cb => { cb.checked = el.checked; });
  updateDeleteBtn();
}

function updateDeleteBtn() {
  const checked = document.querySelectorAll('.content-check:checked');
  const btn = document.getElementById('btnDeleteSelected');
  if (checked.length > 0) {
    btn.style.display = 'inline-block';
    btn.textContent = `🗑️ ${checked.length}개 삭제`;
  } else {
    btn.style.display = 'none';
  }
  // 전체선택 체크박스 동기화
  const all = document.querySelectorAll('.content-check');
  document.getElementById('checkAll').checked = all.length > 0 && checked.length === all.length;
}

async function deleteSelectedContents() {
  const checked = document.querySelectorAll('.content-check:checked');
  if (checked.length === 0) return;

  const ids = Array.from(checked).map(cb => cb.value);
  const idList = ids.length <= 3 ? ids.join(', ') : `${ids.slice(0,3).join(', ')} 외 ${ids.length - 3}개`;

  if (!confirm(`${ids.length}개 콘텐츠를 삭제합니다.\n\n${idList}\n\n⚠️ Firestore 문서 + Storage 아카이브가 모두 삭제됩니다.\n정말 삭제하시겠습니까?`)) return;

  const btn = document.getElementById('btnDeleteSelected');
  btn.textContent = '삭제 중...';
  btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/deleteContent`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contentIds: ids })
    });
    const data = await res.json();
    if (data.success) {
      alert(`${data.deleted}/${data.total}개 삭제 완료`);
      document.getElementById('checkAll').checked = false;
      btn.style.display = 'none';
      btn.disabled = false;
      init(); // 목록 새로고침
    } else {
      alert('삭제 실패: ' + (data.error || '알 수 없는 오류'));
      btn.textContent = `🗑️ ${ids.length}개 삭제`;
      btn.disabled = false;
    }
  } catch (e) {
    alert('삭제 실패: ' + e.message);
    btn.textContent = `🗑️ ${ids.length}개 삭제`;
    btn.disabled = false;
  }
}
