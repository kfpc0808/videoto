<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videoto — 콘텐츠 자동 생성 관리</title>
<style>
  :root {
    --primary: #1a56db; --primary-light: #3b82f6; --success: #059669;
    --warning: #d97706; --danger: #dc2626; --bg: #0f172a; --surface: #1e293b;
    --surface2: #334155; --text: #f1f5f9; --text-dim: #94a3b8; --border: #475569;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header h1 span { color: var(--primary-light); }
  .header-actions { display: flex; gap: 12px; align-items: center; }

  /* Kill Switch */
  .kill-switch { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .kill-switch label { cursor: pointer; }
  .toggle { width: 44px; height: 24px; background: var(--success); border-radius: 12px; position: relative; cursor: pointer; transition: .3s; }
  .toggle.off { background: var(--danger); }
  .toggle::after { content: ''; width: 20px; height: 20px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: .3s; }
  .toggle.off::after { left: 22px; }

  /* Layout */
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }

  /* Stat Cards */
  .stat-card { background: var(--surface); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
  .stat-card .label { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
  .stat-card .value { font-size: 28px; font-weight: 800; }
  .stat-card .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  /* Panels */
  .panel { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 24px; overflow: hidden; }
  .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .panel-header h2 { font-size: 16px; font-weight: 600; }
  .panel-body { padding: 20px; }

  /* Table */
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; font-size: 13px; color: var(--text-dim); font-weight: 500; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; font-size: 14px; border-bottom: 1px solid rgba(71,85,105,.3); }
  tr:hover td { background: rgba(59,130,246,.05); }

  /* Badges */
  .badge { padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; display: inline-block; }
  .badge-published { background: rgba(5,150,105,.15); color: #34d399; }
  .badge-generated { background: rgba(217,119,6,.15); color: #fbbf24; }
  .badge-error { background: rgba(220,38,38,.15); color: #f87171; }
  .badge-skipped { background: rgba(148,163,184,.15); color: #94a3b8; }

  /* Buttons */
  .btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: .2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-light); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--primary-light); color: var(--primary-light); }
  .btn-danger { background: var(--danger); color: #fff; }

  /* Topic Selector */
  .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
  .topic-item { padding: 10px 14px; background: var(--surface2); border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: .2s; font-size: 13px; }
  .topic-item:hover { border-color: var(--primary-light); }
  .topic-item.selected { border-color: var(--primary); background: rgba(26,86,219,.15); }
  .topic-item .cat { font-size: 11px; color: var(--text-dim); }

  /* Detail Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--surface); border-radius: 16px; max-width: 800px; width: 90%; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border); }
  .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-body { padding: 20px; }
  .close-btn { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { padding: 8px 16px; border-radius: 8px; background: var(--surface2); color: var(--text-dim); cursor: pointer; font-size: 13px; border: none; }
  .tab.active { background: var(--primary); color: #fff; }

  /* Code block */
  .code-block { background: var(--bg); border-radius: 8px; padding: 16px; font-family: 'JetBrains Mono', monospace; font-size: 13px; overflow-x: auto; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }

  /* Loading */
  .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-dim); }
  .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--primary-light); border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr 1fr; }
    .topic-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📹 <span>Videoto</span> — 콘텐츠 자동 생성</h1>
  <div class="header-actions">
    <div class="kill-switch">
      <span>시스템</span>
      <div class="toggle" id="killSwitch" onclick="toggleKillSwitch()"></div>
    </div>
    <button class="btn btn-primary" onclick="openGeneratePanel()">➕ 수동 생성</button>
    <button class="btn btn-outline" onclick="loadDashboard()">🔄 새로고침</button>
  </div>
</div>

<div class="container">
  <!-- Stats -->
  <div class="grid" id="stats">
    <div class="stat-card"><div class="label">총 콘텐츠</div><div class="value" id="statTotal">-</div><div class="sub">생성된 전체 콘텐츠</div></div>
    <div class="stat-card"><div class="label">게시 완료</div><div class="value" id="statPublished" style="color:var(--success)">-</div><div class="sub">플랫폼 게시 완료</div></div>
    <div class="stat-card"><div class="label">대기 중</div><div class="value" id="statPending" style="color:var(--warning)">-</div><div class="sub">게시 대기</div></div>
    <div class="stat-card"><div class="label">다음 주제</div><div class="value" id="statNextTopic" style="font-size:16px;">-</div><div class="sub" id="statNextTopicSub">-</div></div>
  </div>

  <!-- Recent Contents -->
  <div class="panel">
    <div class="panel-header">
      <h2>📋 최근 콘텐츠</h2>
      <span style="font-size:13px; color:var(--text-dim);">최근 20개</span>
    </div>
    <div class="panel-body" style="padding:0;">
      <table>
        <thead>
          <tr><th>콘텐츠 ID</th><th>주제</th><th>카테고리</th><th>상태</th><th>생성일</th><th>액션</th></tr>
        </thead>
        <tbody id="contentTable">
          <tr><td colspan="6" class="loading"><div class="spinner"></div> 로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Generate Panel -->
  <div class="panel" id="generatePanel" style="display:none;">
    <div class="panel-header">
      <h2>➕ 수동 콘텐츠 생성</h2>
      <button class="btn btn-sm btn-outline" onclick="document.getElementById('generatePanel').style.display='none'">닫기</button>
    </div>
    <div class="panel-body">
      <p style="margin-bottom:12px; color:var(--text-dim);">생성할 주제를 선택하세요 (선택하지 않으면 순서대로 자동 선택)</p>
      <div class="topic-grid" id="topicGrid"></div>
      <div style="margin-top:20px; display:flex; gap:12px;">
        <button class="btn btn-primary" onclick="runGenerate()" id="generateBtn">🚀 콘텐츠 생성 시작</button>
        <span id="generateStatus" style="align-self:center; font-size:14px; color:var(--text-dim);"></span>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">콘텐츠 상세</h2>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="loading"><div class="spinner"></div> 로딩 중...</div>
    </div>
  </div>
</div>

<script>
// ── 설정 ──
const API_BASE = window.location.origin; // Firebase Hosting과 같은 도메인
// 로컬 테스트 시: const API_BASE = 'http://localhost:5001/kfpc-company-support-project/asia-northeast3';

const TOPICS = [
  { id: 'T01', category: 'AI기능', title: '여러 AI를 한 번에' },
  { id: 'T02', category: 'AI기능', title: 'AI 버튼 한 번으로 전문 분석' },
  { id: 'T03', category: 'AI기능', title: 'RAG 기반 자료 검색' },
  { id: 'T04', category: 'AI기능', title: '이중 답변 구조' },
  { id: 'T05', category: 'AI기능', title: '월 100만 토큰 무료' },
  { id: 'T06', category: '관리', title: '커스터마이징' },
  { id: 'T07', category: '관리', title: '메뉴 자유 편집' },
  { id: 'T08', category: '관리', title: '반응형+모바일 최적화' },
  { id: 'T09', category: '관리', title: '유지보수 비용 절감' },
  { id: 'T10', category: '마케팅', title: '준비된 컨설턴트' },
  { id: 'T11', category: '마케팅', title: '시간은 더 가치 있는 일에' },
  { id: 'T12', category: '마케팅', title: '자료와 정보 한 곳에서' },
  { id: 'T13', category: '마케팅', title: '고객 데이터가 경쟁력' },
  { id: 'T14', category: '브랜딩', title: '전문성 홈페이지가 말한다' },
  { id: 'T15', category: '브랜딩', title: '혼자 일하지 마세요' },
  { id: 'T16', category: '브랜딩', title: '홈페이지도 경쟁력' },
  { id: 'T17', category: '브랜딩', title: '전문성 영상으로' },
  { id: 'T18', category: '브랜딩', title: '전문가 네트워크' },
  { id: 'T19', category: '브랜딩', title: '영상 콘텐츠 연결' },
  { id: 'T20', category: '특장점', title: '추천 보상 시스템' },
];

let selectedTopicIndex = null;

// ── 대시보드 로드 ──
async function loadDashboard() {
  try {
    // 시스템 상태
    const statusRes = await fetch(`${API_BASE}/systemStatus`);
    if (statusRes.ok) {
      const data = await statusRes.json();
      if (data.success) {
        document.getElementById('killSwitch').className = data.system.killSwitch ? 'toggle off' : 'toggle';
        const nextIdx = data.system.currentTopicIndex % TOPICS.length;
        document.getElementById('statNextTopic').textContent = TOPICS[nextIdx]?.title || '-';
        document.getElementById('statNextTopicSub').textContent = `#${nextIdx + 1} / ${TOPICS.length}`;
      }
    }
  } catch (e) { console.log('시스템 상태 로드 실패 (정상 - API 미연결)'); }

  try {
    // 콘텐츠 목록
    const listRes = await fetch(`${API_BASE}/listContents?limit=20`);
    if (listRes.ok) {
      const data = await listRes.json();
      if (data.success) {
        renderContentTable(data.contents);
        updateStats(data.contents);
      }
    } else {
      renderDemoData();
    }
  } catch (e) {
    console.log('콘텐츠 목록 로드 실패 (데모 데이터 표시)');
    renderDemoData();
  }
}

function renderDemoData() {
  const demo = [
    { contentId: '20260318_T01', topic: { title: '여러 AI를 한 번에', category: 'AI기능' }, status: 'published', createdAt: { _seconds: Date.now()/1000 - 86400 } },
    { contentId: '20260311_T14', topic: { title: '전문성 홈페이지가 말한다', category: '브랜딩' }, status: 'published', createdAt: { _seconds: Date.now()/1000 - 604800 } },
    { contentId: '20260304_T10', topic: { title: '준비된 컨설턴트', category: '마케팅' }, status: 'generated', createdAt: { _seconds: Date.now()/1000 - 1209600 } },
  ];
  renderContentTable(demo);
  updateStats(demo);
}

function updateStats(contents) {
  document.getElementById('statTotal').textContent = contents.length;
  document.getElementById('statPublished').textContent = contents.filter(c => c.status === 'published').length;
  document.getElementById('statPending').textContent = contents.filter(c => c.status === 'generated').length;
}

function renderContentTable(contents) {
  const tbody = document.getElementById('contentTable');
  if (!contents.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px; color:var(--text-dim);">아직 생성된 콘텐츠가 없습니다. 위의 "수동 생성" 버튼으로 시작하세요.</td></tr>';
    return;
  }

  tbody.innerHTML = contents.map(c => {
    const date = c.createdAt?._seconds ? new Date(c.createdAt._seconds * 1000).toLocaleDateString('ko') : '-';
    const badgeClass = c.status === 'published' ? 'badge-published' : c.status === 'generated' ? 'badge-generated' : 'badge-error';
    const statusText = c.status === 'published' ? '게시완료' : c.status === 'generated' ? '대기중' : c.status;
    return `<tr>
      <td><code style="color:var(--primary-light);">${c.contentId || '-'}</code></td>
      <td>${c.topic?.title || '-'}</td>
      <td><span style="color:var(--text-dim);">${c.topic?.category || '-'}</span></td>
      <td><span class="badge ${badgeClass}">${statusText}</span></td>
      <td>${date}</td>
      <td>
        <button class="btn btn-sm btn-outline" onclick="viewDetail('${c.contentId}')">상세</button>
        <button class="btn btn-sm btn-outline" onclick="downloadSet('${c.contentId}')">📥</button>
      </td>
    </tr>`;
  }).join('');
}

// ── 수동 생성 ──
function openGeneratePanel() {
  const panel = document.getElementById('generatePanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  renderTopicGrid();
}

function renderTopicGrid() {
  const grid = document.getElementById('topicGrid');
  grid.innerHTML = TOPICS.map((t, i) => `
    <div class="topic-item ${selectedTopicIndex === i ? 'selected' : ''}" onclick="selectTopic(${i})">
      <div class="cat">${t.category}</div>
      <strong>${t.title}</strong>
    </div>
  `).join('');
}

function selectTopic(idx) {
  selectedTopicIndex = selectedTopicIndex === idx ? null : idx;
  renderTopicGrid();
}

async function runGenerate() {
  const btn = document.getElementById('generateBtn');
  const status = document.getElementById('generateStatus');
  btn.disabled = true;
  btn.textContent = '⏳ 생성 중...';
  status.textContent = 'AI 파이프라인 실행 중... (약 1~3분 소요)';

  try {
    const url = selectedTopicIndex !== null
      ? `${API_BASE}/manualGenerate?topicIndex=${selectedTopicIndex}`
      : `${API_BASE}/manualGenerate`;

    const res = await fetch(url);
    const data = await res.json();

    if (data.success) {
      status.textContent = `✅ 생성 완료! (${data.contentId})`;
      status.style.color = 'var(--success)';
      loadDashboard();
    } else {
      status.textContent = `❌ 실패: ${data.error}`;
      status.style.color = 'var(--danger)';
    }
  } catch (e) {
    status.textContent = `❌ 연결 실패: ${e.message}`;
    status.style.color = 'var(--danger)';
  }

  btn.disabled = false;
  btn.textContent = '🚀 콘텐츠 생성 시작';
}

// ── 상세 보기 ──
async function viewDetail(contentId) {
  const modal = document.getElementById('detailModal');
  const title = document.getElementById('modalTitle');
  const body = document.getElementById('modalBody');

  modal.classList.add('active');
  title.textContent = `📄 ${contentId}`;
  body.innerHTML = '<div class="loading"><div class="spinner"></div> 로딩 중...</div>';

  try {
    const res = await fetch(`${API_BASE}/getContent?id=${contentId}`);
    const data = await res.json();

    if (data.success && data.content) {
      renderDetailModal(data.content);
    } else {
      body.innerHTML = `<p style="color:var(--text-dim);">콘텐츠를 찾을 수 없습니다. (API 연결 확인 필요)</p>
        <div class="code-block">${JSON.stringify(data, null, 2)}</div>`;
    }
  } catch (e) {
    body.innerHTML = `<p style="color:var(--warning);">API 미연결 상태입니다. Firebase 배포 후 사용 가능합니다.</p>
      <p style="margin-top:12px; font-size:14px; color:var(--text-dim);">콘텐츠 ID: ${contentId}</p>`;
  }
}

function renderDetailModal(content) {
  const body = document.getElementById('modalBody');
  const archive = content.archive || {};

  body.innerHTML = `
    <div class="tabs">
      <button class="tab active" onclick="showTab('info',this)">기본 정보</button>
      <button class="tab" onclick="showTab('scripts',this)">스크립트</button>
      <button class="tab" onclick="showTab('files',this)">파일/다운로드</button>
    </div>

    <div id="tab-info">
      <table>
        <tr><td style="width:120px; color:var(--text-dim);">콘텐츠 ID</td><td><strong>${content.contentId}</strong></td></tr>
        <tr><td style="color:var(--text-dim);">주제</td><td>${content.topic?.title || '-'}</td></tr>
        <tr><td style="color:var(--text-dim);">카테고리</td><td>${content.topic?.category || '-'}</td></tr>
        <tr><td style="color:var(--text-dim);">상태</td><td>${content.status}</td></tr>
        <tr><td style="color:var(--text-dim);">AI 소요시간</td><td>${content.metadata?.elapsedSeconds || '-'}초</td></tr>
      </table>
    </div>

    <div id="tab-scripts" style="display:none;">
      <h3 style="margin-bottom:12px;">📝 스크립트 3버전</h3>
      <p style="margin-bottom:8px;"><strong>1차 초안 (GPT-4o)</strong></p>
      ${archive.scriptDraft ? `<a href="${archive.scriptDraft}" target="_blank" class="btn btn-sm btn-outline">📥 01_draft.json</a>` : '<span style="color:var(--text-dim);">없음</span>'}

      <p style="margin:16px 0 8px;"><strong>2차 검수 (Claude)</strong></p>
      ${archive.scriptReviewed ? `<a href="${archive.scriptReviewed}" target="_blank" class="btn btn-sm btn-outline">📥 02_reviewed.json</a>` : '<span style="color:var(--text-dim);">없음</span>'}

      <p style="margin:16px 0 8px;"><strong>3차 최종 (Claude)</strong></p>
      ${archive.scriptFinal ? `<a href="${archive.scriptFinal}" target="_blank" class="btn btn-sm btn-outline">📥 03_final.json</a>` : '<span style="color:var(--text-dim);">없음</span>'}
    </div>

    <div id="tab-files" style="display:none;">
      <h3 style="margin-bottom:12px;">📂 생성된 파일</h3>
      <table>
        ${Object.entries(archive).map(([key, url]) => `
          <tr><td style="color:var(--text-dim);">${key}</td><td><a href="${url}" target="_blank" style="color:var(--primary-light);">다운로드</a></td></tr>
        `).join('')}
      </table>
    </div>
  `;
}

function showTab(tabId, btn) {
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tabId}`).style.display = 'block';
  btn.classList.add('active');
}

function closeModal() { document.getElementById('detailModal').classList.remove('active'); }

// ── 다운로드 세트 ──
async function downloadSet(contentId) {
  try {
    const res = await fetch(`${API_BASE}/getContent?id=${contentId}`);
    const data = await res.json();
    if (data.success && data.content?.archive) {
      Object.values(data.content.archive).forEach(url => {
        if (url) window.open(url, '_blank');
      });
    }
  } catch (e) {
    alert('API 연결 확인 필요. Firebase 배포 후 사용 가능합니다.');
  }
}

// ── Kill Switch ──
async function toggleKillSwitch() {
  const el = document.getElementById('killSwitch');
  const isOff = el.classList.contains('off');

  if (!isOff && !confirm('⚠️ 시스템을 중지하시겠습니까? 예약된 자동 생성/게시가 중단됩니다.')) return;

  const newState = !isOff;
  el.className = newState ? 'toggle off' : 'toggle';

  try {
    await fetch(`${API_BASE}/systemStatus`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ killSwitch: newState }),
    });
  } catch (e) { console.log('Kill Switch 업데이트 실패 (API 미연결)'); }
}

// ── Init ──
loadDashboard();
</script>
